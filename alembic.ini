; Alembic configuration for GAD.
;
; The application calls `alembic.command.upgrade(cfg, "head")` from
; `backend/db/__init__.py:init_db()` on every boot, so a fresh checkout
; is always at the latest schema revision. CLI usage (for generating
; new migrations during development) reads this same file.

[alembic]
script_location = alembic
prepend_sys_path = backend
file_template = %%(rev)s_%%(slug)s
timezone = UTC

; Default URL — overridden at runtime by env.py from the GAD_DATABASE_URL
; environment variable, or by `config.attributes['connection']` when called
; programmatically from init_db().
sqlalchemy.url = sqlite:///backend/gad.db

[post_write_hooks]
; (no auto-format hooks; ruff handles import order in CI)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
