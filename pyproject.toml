[project]
name = "gad"
version = "0.1.0"
description = "Geospatial Architecture Database — site-based weather risk and construction recommendations"
readme = "README.md"
requires-python = ">=3.8"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]

[tool.ruff]
line-length = 100
target-version = "py38"
extend-exclude = [
    "**/__pycache__",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
# Sensible default rule set:
#   E, W       — pycodestyle errors and warnings
#   F          — pyflakes (undefined names, unused imports, etc.)
#   I          — isort (import order)
#   B          — flake8-bugbear (likely bugs and design issues)
#   UP         — pyupgrade (modernize syntax for the targeted Python version)
#   SIM        — flake8-simplify (simplifiable patterns)
select = ["E", "W", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",  # line too long — soft-enforced via formatter, not lint
    "B008",  # function call in default argument — Flask uses this pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "B011",  # assert False — fine in tests
    "S101",  # use of assert — that's the whole point of tests
]
# Alembic migrations are autogenerated artifacts — we hand-review the SQL
# changes but it's not worth keeping the typing/import style modern in
# every revision file. Imports it generates are also intentionally
# unsorted in places to keep the upgrade/downgrade logic flowing.
"alembic/versions/**/*.py" = [
    "I001",  # import sorting
    "UP006", # use modern PEP 585 generics (List → list)
    "UP007", # use X | Y instead of Union[X, Y]
    "UP035", # `typing.Sequence` → `collections.abc.Sequence`
    "F401",  # imported but unused (alembic boilerplate)
    "W291",  # trailing whitespace (autogenerated `Revises:` line for the root)
]
"alembic/env.py" = [
    "E402",  # late imports after sys.path manipulation
    "I001",  # import sort — ordering preserved for clarity around sys.path tweak
]
